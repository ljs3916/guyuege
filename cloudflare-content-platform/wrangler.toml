name = "cloudflare-content-platform"
main = "src/index.js"
compatibility_date = "2026-05-15"

[vars]
GITHUB_CATALOG_URL = "https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/content-library/main/catalog.json"

[[d1_databases]]
binding = "CONTENT_DB"
database_name = "content-platform"
database_id = "replace-with-d1-id"

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "replace-with-kv-id"

[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "content-platform"
