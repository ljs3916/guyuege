name = "content-platform-api"
main = "src/index.js"
compatibility_date = "2026-05-15"

[[d1_databases]]
binding = "CONTENT_DB"
database_name = "content-platform"
database_id = "replace-with-d1-id"

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "replace-with-kv-id"

[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "content-platform"
